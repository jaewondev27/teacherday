<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>축하합니다!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            cursor: pointer;
        }

        .background-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        #guide-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 12px 24px;
            border-radius: 30px;
            pointer-events: none;
            transition: opacity 0.5s;
            font-family: sans-serif;
        }
    </style>
</head>
<body onclick="toggleFullScreen()">

    <div id="guide-text">화면을 클릭하여 시작 (전체화면)</div>

    <img src="https://i.imgur.com/lz2s0ae.png" alt="배경 이미지" class="background-img">
    <canvas id="confetti-canvas"></canvas>

    <script>
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        const guide = document.getElementById('guide-text');
        let pieces = [];
        let isStarted = false;
        
        const colors = ['#FFB7B2', '#FFDAC1', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#F3FFE3', '#FF9AA2', '#FDFD96', '#B2E2F2'];

        function updateCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
                guide.style.opacity = '0';
                if (!isStarted) {
                    setup();
                    animate();
                    isStarted = true;
                }
            }
        }

        class Confetti {
            constructor(side) {
                this.init(side);
            }

            init(side) {
                this.side = side || (Math.random() > 0.5 ? 'left' : 'right');
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.size = Math.random() * 8 + 8; // 하트 크기를 조금 더 키움
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 6 - 3; // 하트가 자연스럽게 돌게 함
                
                this.x = (this.side === 'left') ? 0 : canvas.width;
                this.y = canvas.height * 1.05; 
                
                const angle = (this.side === 'left') 
                    ? (Math.random() * -55 - 25) // 각도를 더 좁힘
                    : (Math.random() * 55 + 205); // 각도를 더 좁힘
                
                const speed = Math.random() * 22 + 10; // 하트가 더 멀리 퍼지게 함
                this.vx = Math.cos(angle * Math.PI / 180) * speed;
                this.vy = Math.sin(angle * Math.PI / 180) * speed;
                this.gravity = 0.25; 
                this.opacity = 1;
            }

            drawHeart(x, y, size) {
                ctx.beginPath();
                const topCurveHeight = size * 0.3;
                ctx.moveTo(0, topCurveHeight);
                // 하트 곡선 그리기
                ctx.bezierCurveTo(0, 0, -size / 2, 0, -size / 2, topCurveHeight);
                ctx.bezierCurveTo(-size / 2, (size + topCurveHeight) / 2, 0, (size + topCurveHeight) / 2, 0, size);
                ctx.bezierCurveTo(0, (size + topCurveHeight) / 2, size / 2, (size + topCurveHeight) / 2, size / 2, topCurveHeight);
                ctx.bezierCurveTo(size / 2, 0, 0, 0, 0, topCurveHeight);
                ctx.fill();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.rotation += this.rotationSpeed;
                this.opacity -= 0.007; // 서서히 사라짐

                if (this.opacity <= 0 || this.y > canvas.height + 50) {
                    this.init(this.side);
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                
                // 오직 하트만 그림
                this.drawHeart(0, 0, this.size * 1.5);
                
                ctx.restore();
            }
        }

        function setup() {
            updateCanvasSize();
            pieces = [];
            // 파티클 양을 각 방향당 100개씩 총 200개로 설정
            for (let i = 0; i < 100; i++) {
                pieces.push(new Confetti('left'));
                pieces.push(new Confetti('right'));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            updateCanvasSize();
            if(isStarted) setup();
        });
    </script>
</body>
</html>
