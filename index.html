<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>축하합니다!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .background-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <img src="https://i.imgur.com/lz2s0ae.png" 
         alt="배경 이미지" 
         class="background-img">

    <canvas id="confetti-canvas"></canvas>

    <script>
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let pieces = [];
        
        // 화사한 파스텔 톤 색상 팔레트
        const colors = [
            '#FFB7B2', '#FFDAC1', '#E2F0CB', '#B5EAD7', 
            '#C7CEEA', '#F3FFE3', '#FF9AA2', '#FDFD96', '#B2E2F2'
        ];

        function updateCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Confetti {
            constructor(side) {
                this.init(side);
            }

            init(side) {
                this.side = side || (Math.random() > 0.5 ? 'left' : 'right');
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.diameter = Math.random() * 8 + 4;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 10 - 5;
                
                // 폭죽: 화면 하단 구석에서 솟구침
                this.x = (this.side === 'left') ? 0 : canvas.width;
                this.y = canvas.height * 1.1; 
                
                // 솟구치는 각도와 속도 설정
                const angle = (this.side === 'left') 
                    ? (Math.random() * -60 - 15) // 왼쪽 -> 오른쪽 위
                    : (Math.random() * 60 + 195); // 오른쪽 -> 왼쪽 위
                
                const speed = Math.random() * 20 + 10;
                this.vx = Math.cos(angle * Math.PI / 180) * speed;
                this.vy = Math.sin(angle * Math.PI / 180) * speed;
                
                this.gravity = 0.2; // 떨어지는 무게감
                this.opacity = 1;
                this.life = 1.0; // 생존 수명
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.rotation += this.rotationSpeed;
                this.opacity -= 0.005; // 서서히 사라짐

                // 화면 밖으로 완전히 나가거나 투명해지면 다시 생성
                if (this.opacity <= 0 || this.y > canvas.height + 100) {
                    this.init(this.side);
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                
                // 사각형 형태의 꽃가루 조각
                ctx.fillRect(-this.diameter / 2, -this.diameter / 2, this.diameter, this.diameter);
                
                ctx.restore();
            }
        }

        function setup() {
            updateCanvasSize();
            pieces = [];
            // 양쪽에서 터지는 폭죽 입자 수 (총 300개로 풍성하게 설정)
            for (let i = 0; i < 150; i++) {
                pieces.push(new Confetti('left'));
                pieces.push(new Confetti('right'));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            updateCanvasSize();
            setup();
        });

        setup();
        animate();
    </script>
</body>
</html>
