<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>축하합니다!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            cursor: pointer; /* 클릭 유도를 위해 커서 변경 */
        }

        .background-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* 클릭 안내 문구 */
        #guide-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 15px 30px;
            border-radius: 50px;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body onclick="toggleFullScreen()">

    <div id="guide-text">화면을 클릭하여 전체화면으로 보기</div>

    <img src="https://i.imgur.com/lz2s0ae.png" 
         alt="배경 이미지" 
         class="background-img">

    <canvas id="confetti-canvas"></canvas>

    <script>
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        const guide = document.getElementById('guide-text');
        let pieces = [];
        let isStarted = false;
        
        const colors = ['#FFB7B2', '#FFDAC1', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#F3FFE3', '#FF9AA2', '#FDFD96', '#B2E2F2'];

        function updateCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // 전체화면 전환 함수
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error: ${err.message}`);
                });
                guide.style.opacity = '0';
                if (!isStarted) {
                    setup();
                    animate();
                    isStarted = true;
                }
            }
        }

        class Confetti {
            constructor(side) {
                this.init(side);
            }

            init(side) {
                this.side = side || (Math.random() > 0.5 ? 'left' : 'right');
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.diameter = Math.random() * 8 + 4;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 10 - 5;
                this.x = (this.side === 'left') ? 0 : canvas.width;
                this.y = canvas.height * 1.1; 
                
                const angle = (this.side === 'left') 
                    ? (Math.random() * -60 - 15) 
                    : (Math.random() * 60 + 195); 
                
                const speed = Math.random() * 20 + 12;
                this.vx = Math.cos(angle * Math.PI / 180) * speed;
                this.vy = Math.sin(angle * Math.PI / 180) * speed;
                this.gravity = 0.2; 
                this.opacity = 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.rotation += this.rotationSpeed;
                this.opacity -= 0.005;

                if (this.opacity <= 0 || this.y > canvas.height + 100) {
                    this.init(this.side);
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.diameter / 2, -this.diameter / 2, this.diameter, this.diameter);
                ctx.restore();
            }
        }

        function setup() {
            updateCanvasSize();
            pieces = [];
            for (let i = 0; i < 150; i++) {
                pieces.push(new Confetti('left'));
                pieces.push(new Confetti('right'));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            updateCanvasSize();
            if(isStarted) setup();
        });

    </script>
</body>
</html>
